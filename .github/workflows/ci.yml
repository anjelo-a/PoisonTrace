name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Invariant guardrails
        run: ./scripts/ci_guardrails.sh
      - name: Fixture execution guardrails
        run: go test ./internal/fixtures -count=1
